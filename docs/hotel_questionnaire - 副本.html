<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户问卷｜酒店 AI 洞察系统</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --ink: #172033; --muted: #667085; --line: #d9e0ea; --surface: #ffffff;
      --brand: #245b8f; --brand-strong: #163d66; --accent: #c67b38;
      --good: #17825e; --bad: #b42318; --shadow: 0 18px 48px rgba(26, 36, 55, 0.12);
    }
    body {
      margin: 0; min-height: 100vh; color: var(--ink);
      background: linear-gradient(180deg, rgba(245, 247, 251, 0.96), rgba(239, 243, 248, 0.96));
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }
    [hidden] { display: none !important; }
    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app-shell { display: grid; grid-template-columns: 1fr; }
    .main { max-width: 1060px; margin: 0 auto; width: 100%; padding: 28px; }
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; padding-bottom: 22px; }
    .page-title { margin: 0 0 8px; font-size: clamp(28px, 4vw, 44px); line-height: 1.08; letter-spacing: 0; }
    .page-subtitle { max-width: 760px; margin: 0; color: var(--muted); line-height: 1.65; }
    
    .actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 10px; min-width: 250px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 40px; padding: 0 14px; border-radius: 8px; color: #ffffff; background: var(--brand); box-shadow: 0 8px 22px rgba(36, 91, 143, 0.18); white-space: nowrap; }
    .btn:hover { background: var(--brand-strong); }
    .btn.secondary { color: var(--ink); background: #ffffff; border: 1px solid var(--line); box-shadow: none; }

    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
    .section { scroll-margin-top: 24px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); overflow: hidden; }
    .section-head { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid var(--line); background: #fbfcfe; }
    .section-head h2 { margin: 0; font-size: 18px; }
    .section-body { padding: 20px; }

    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .field { display: grid; gap: 7px; }
    .field.full { grid-column: 1 / -1; }
    label { color: #344054; font-size: 13px; font-weight: 680; }
    input, textarea { width: 100%; border: 1px solid #cfd8e4; border-radius: 8px; padding: 11px 12px; color: var(--ink); background: #ffffff; outline: none; }
    textarea { min-height: 86px; resize: vertical; line-height: 1.55; }
    input:focus, textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(36, 91, 143, 0.12); }

    .check-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 2px; }
    .check-item { display: flex; align-items: center; gap: 8px; min-height: 38px; padding: 8px 10px; border: 1px solid #dfe5ee; border-radius: 8px; background: #fbfcfe; color: #344054; font-size: 14px; }
    
    .tag { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; background: #eef3f8; color: #344054; font-size: 12px; }
    .progress-shell { width: 100%; height: 9px; margin-top: 14px; border-radius: 999px; background: #e7edf4; overflow: hidden; }
    .progress-bar { width: 0; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--brand), var(--accent)); transition: width 0.35s ease; }

    .toast { position: fixed; right: 24px; bottom: 24px; z-index: 20; padding: 12px 14px; color: #ffffff; background: #172033; border-radius: 8px; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18); transform: translateY(20px); opacity: 0; pointer-events: none; transition: 0.2s ease; }
    .toast.show { transform: translateY(0); opacity: 1; }

    .ticket-banner { display: none; margin-top: 16px; padding: 12px 18px; background: #eef3f8; border: 1px dashed var(--brand); border-radius: 8px; color: var(--brand-strong); font-size: 14px; font-weight: bold; }
    .ticket-badge { background: #fff; padding: 2px 8px; border-radius: 4px; border: 1px solid #d9e0ea; color: var(--accent); font-family: monospace; }
    
    /* 🌟 一次性链接失效拦截状态样式 */
    .invalid-block { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; }
    .invalid-icon { width: 72px; height: 72px; border-radius: 50%; background: #fef2f2; color: #b42318; display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 20px; }
    .invalid-title { font-size: 24px; font-weight: 800; color: #172033; margin: 0 0 12px 0; }
    .invalid-desc { font-size: 15px; color: #667085; max-width: 480px; line-height: 1.6; margin: 0; }
  </style>
</head>
<body>
  <div class="app-shell" id="appShell">
    <main class="main">
      <div class="topbar">
        <div>
          <h1 class="page-title">酒店 AI 洞察系统｜专属问卷</h1>
          <p class="page-subtitle">请填写酒店基础信息、核心卖点及诊断目标。<strong>(注：本链接为高安全一次性链接，资料提交后将永久失效不可篡改)</strong></p>
          
          <div id="ticketBanner" class="ticket-banner">
            <span>当前关联诊断工单：<span id="displayTicketId" class="ticket-badge"></span></span>
          </div>
        </div>
        <div class="actions" id="actionGroup">
          <button class="btn secondary" data-action="sample" type="button">◎ 示例填充</button>
        </div>
      </div>

      <section class="section invalid-block" id="invalidState">
        <div class="invalid-icon">✕</div>
        <h2 class="invalid-title">该专属诊断链接已熔断失效</h2>
        <p class="invalid-desc">为了保障您的商业资料安全，系统检测到该工单的数据已于云端被成功锁定并进入 AI 洗列阶段。一次性链接无法被重复打开或二次覆盖。</p>
      </section>

      <section class="section" id="surveyWrapper">
        <div class="section-head">
          <h2>客户填报区</h2>
          <span class="tag" id="pkgTag">一次性安全链接</span>
        </div>
        <div class="section-body">
          <div style="margin-bottom: 18px;">
            <div style="display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 13px;">
              <span>问卷完整度</span>
              <strong id="surveyProgressText" style="color: var(--brand);">0%</strong>
            </div>
            <div class="progress-shell"><div class="progress-bar" id="surveyProgressBar"></div></div>
          </div>
          
          <form id="surveyForm" class="field-grid">
            <div class="field">
              <label for="clientName">客户名称</label>
              <input id="clientName" name="clientName" placeholder="例如：汉庭北京新国展祥云小镇店">
            </div>
            
            <div class="field">
              <label for="contact">联系人 / 手机号 (用于接收报告)</label>
              <input id="contact" name="contact" placeholder="例如：王经理 13812345678">
            </div>
            
            <div class="field">
              <label for="brandName">品牌 / 管理方</label>
              <input id="brandName" name="brandName" placeholder="例如：华住 / 汉庭">
            </div>
            <div class="field">
              <label for="cityArea">城市商圈</label>
              <input id="cityArea" name="cityArea" placeholder="例如：北京顺义 · 新国展">
            </div>
            <div class="field full">
              <label for="hotelAddress">酒店地址</label>
              <input id="hotelAddress" name="hotelAddress" placeholder="用于判断周边场景和推荐词">
            </div>
            <div class="field full">
              <label>主要客群场景</label>
              <div class="check-grid" id="sceneChecks">
                <label class="check-item"><input type="checkbox" name="scenes" value="商务出差">商务出差</label>
                <label class="check-item"><input type="checkbox" name="scenes" value="机场中转">机场中转</label>
                <label class="check-item"><input type="checkbox" name="scenes" value="展会住宿">展会住宿</label>
                <label class="check-item"><input type="checkbox" name="scenes" value="亲子出游">亲子出游</label>
                <label class="check-item"><input type="checkbox" name="scenes" value="情侣约会">情侣约会</label>
                <label class="check-item"><input type="checkbox" name="scenes" value="本地休闲">本地休闲</label>
              </div>
            </div>
            <div class="field full">
              <label for="sellingPoints">酒店核心卖点</label>
              <textarea id="sellingPoints" name="sellingPoints" placeholder="例如：免费停车、机器人服务、自助洗衣、55寸投屏电视"></textarea>
            </div>
            <div class="field full">
              <label for="platforms">重点平台 / 信源</label>
              <input id="platforms" name="platforms" placeholder="例如：携程、美团、抖音、小红书">
            </div>
            <div class="field full">
              <label for="recommendKeywords">希望 AI 推荐时出现的关键词</label>
              <input id="recommendKeywords" name="recommendKeywords" placeholder="例如：首都机场中转酒店、顺义性价比酒店">
            </div>
            <div class="field full">
              <label for="knownCompetitors">主要竞品</label>
              <input id="knownCompetitors" name="knownCompetitors" placeholder="例如：桔子水晶、希尔顿欢朋">
            </div>
            <div class="field full">
              <label for="businessGoal">本次诊断目标</label>
              <textarea id="businessGoal" name="businessGoal" placeholder="例如：提升 AI 推荐可见度，找出被竞品截流的场景"></textarea>
            </div>
          </form>
          
          <div class="form-actions" id="formActionGroup">
            <button class="btn secondary" id="resetForm" type="button">清空问卷</button>
            <button class="btn" id="submitSurvey" type="button">提交并锁死入库</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const form = document.getElementById("surveyForm");
    const toast = document.getElementById("toast");
    const surveyProgressText = document.getElementById("surveyProgressText");
    const surveyProgressBar = document.getElementById("surveyProgressBar");

    let currentTicketId = '独立填报';

    // 🌟 一次性链接拦截大门神
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const ticketId = urlParams.get('id');
      const isOneTime = urlParams.get('type') === 'onetime';
      
      if (ticketId) {
        currentTicketId = ticketId;
        const banner = document.getElementById('ticketBanner');
        banner.style.display = 'flex';
        document.getElementById('displayTicketId').textContent = ticketId;
        
        // 【防篡改校验】检查本地是否已经标记该工单为已提交
        const isSubmitted = localStorage.getItem(`survey_lock_${ticketId}`);
        if (isSubmitted) {
          // 彻底熔断页面！隐藏整个问卷，并弹出硬核警告。
          document.getElementById('surveyWrapper').style.display = 'none';
          document.getElementById('actionGroup').style.display = 'none';
          document.getElementById('invalidState').style.display = 'flex';
          return;
        }
      }
      // 初始化进度条
      updateSurveyProgress();
    });

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2500);
    }

    function getSelectedScenes() {
      return Array.from(form.querySelectorAll('input[name="scenes"]:checked')).map(item => item.value);
    }

    function getFormData() {
      return {
        ticketId: currentTicketId,
        clientName: form.clientName.value.trim(),
        contact: form.contact.value.trim(),
        brandName: form.brandName.value.trim(),
        cityArea: form.cityArea.value.trim(),
        hotelAddress: form.hotelAddress.value.trim(),
        scenes: getSelectedScenes(),
        sellingPoints: form.sellingPoints.value.trim(),
        platforms: form.platforms.value.trim(),
        recommendKeywords: form.recommendKeywords.value.trim(),
        knownCompetitors: form.knownCompetitors.value.trim(),
        businessGoal: form.businessGoal.value.trim(),
        submittedAt: new Date().toLocaleString("zh-CN")
      };
    }

    function requiredProgress(data) {
      const required = [
        data.clientName, data.contact, data.cityArea, data.scenes.length, 
        data.sellingPoints, data.platforms, data.recommendKeywords, data.businessGoal
      ];
      const filled = required.filter(Boolean).length;
      return Math.round((filled / required.length) * 100);
    }

    function validateSurvey(data) {
      const missing = [];
      if (!data.clientName) missing.push("客户名称");
      if (!data.contact) missing.push("联系人手机号");
      if (!data.cityArea) missing.push("城市商圈");
      if (!data.scenes.length) missing.push("主要客群场景");
      if (!data.sellingPoints) missing.push("酒店核心卖点");
      if (!data.platforms) missing.push("重点平台/信源");
      if (!data.recommendKeywords) missing.push("推荐关键词");
      if (!data.businessGoal) missing.push("诊断目标");
      return missing;
    }

    function updateSurveyProgress() {
      const progress = requiredProgress(getFormData());
      surveyProgressText.textContent = `${progress}%`;
      surveyProgressBar.style.width = `${progress}%`;
    }

    function fillSample() {
      form.clientName.value = "汉庭北京新国展祥云小镇店";
      form.contact.value = "王经理 13812345678";
      form.brandName.value = "华住 / 汉庭";
      form.cityArea.value = "北京顺义 · 新国展";
      form.hotelAddress.value = "北京市顺义区安泰大街祥云小镇附近";
      form.querySelectorAll('input[name="scenes"]').forEach(item => {
        item.checked = ["商务出差", "机场中转", "展会住宿"].includes(item.value);
      });
      form.sellingPoints.value = "免费停车、机器人服务、自助洗衣、24小时咖啡饮品";
      form.platforms.value = "携程、美团、抖音、小红书";
      form.recommendKeywords.value = "新国展附近酒店、首都机场中转住宿";
      form.knownCompetitors.value = "桔子水晶、远航国际";
      form.businessGoal.value = "提升 AI 推荐可见度，找出被竞品截流的场景";
      updateSurveyProgress();
      showToast("为了方便演示，示例内容已自动装填完成");
    }

    function submitSurvey() {
      const data = getFormData();
      const missing = validateSurvey(data);
      if (missing.length > 0) {
        showToast(`尚未填报完整！请补充：${missing.join("、")}`);
        return;
      }
      
      showToast("资料已安全上传，大后台正在验证签名...");
      
      // 模拟 1.5 秒的网络传输耗时后触发熔断
      setTimeout(() => {
        // 🌟 核心：为当前工单打上本地锁死标记
        if (currentTicketId !== '独立填报') {
          localStorage.setItem(`survey_lock_${currentTicketId}`, 'LOCKED_AND_SUBMITTED');
        }
        // 强行刷新页面，让顶部的验证器起效，进入“已失效”拦截状态
        window.location.reload();
      }, 1500);
    }

    function resetSurvey() {
      form.reset();
      updateSurveyProgress();
      showToast("问卷已清空");
    }

    form.addEventListener("input", updateSurveyProgress);
    form.addEventListener("change", updateSurveyProgress);
    document.querySelector('[data-action="sample"]').addEventListener("click", fillSample);
    document.getElementById("submitSurvey").addEventListener("click", submitSurvey);
    document.getElementById("resetForm").addEventListener("click", resetSurvey);
  </script>
</body>
</html>
