<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户问卷｜酒店 AI 洞察系统</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --surface: #ffffff;
      --soft: #f5f7fb;
      --brand: #245b8f;
      --brand-strong: #163d66;
      --accent: #c67b38;
      --good: #17825e;
      --warn: #b76517;
      --bad: #b42318;
      --shadow: 0 18px 48px rgba(26, 36, 55, 0.12);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(245, 247, 251, 0.96), rgba(239, 243, 248, 0.96)),
        repeating-linear-gradient(90deg, rgba(36, 91, 143, 0.05) 0 1px, transparent 1px 64px);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    [hidden] {
      display: none !important;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr);
      min-height: 100vh;
    }

    /* 省略了侧边栏相关的冗余类，原样保留核心布局 */
    .app-shell { grid-template-columns: 1fr; }
    .main { max-width: 1060px; margin: 0 auto; width: 100%; padding: 28px; }
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 24px; padding-bottom: 22px; }
    .page-title { margin: 0 0 8px; font-size: clamp(28px, 4vw, 44px); line-height: 1.08; letter-spacing: 0; }
    .page-subtitle { max-width: 760px; margin: 0; color: var(--muted); line-height: 1.65; }
    
    .actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 10px; min-width: 250px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; min-height: 40px; padding: 0 14px; border-radius: 8px; color: #ffffff; background: var(--brand); box-shadow: 0 8px 22px rgba(36, 91, 143, 0.18); white-space: nowrap; }
    .btn:hover { background: var(--brand-strong); }
    .btn.secondary { color: var(--ink); background: #ffffff; border: 1px solid var(--line); box-shadow: none; }

    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; }
    .section { scroll-margin-top: 24px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); overflow: hidden; }
    .section + .section { margin-top: 18px; }
    .section-head { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 18px 20px; border-bottom: 1px solid var(--line); background: #fbfcfe; }
    .section-head h2 { margin: 0; font-size: 18px; letter-spacing: 0; }
    .section-body { padding: 20px; }

    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .field { display: grid; gap: 7px; }
    .field.full { grid-column: 1 / -1; }
    label { color: #344054; font-size: 13px; font-weight: 680; }
    input, textarea, select { width: 100%; border: 1px solid #cfd8e4; border-radius: 8px; padding: 11px 12px; color: var(--ink); background: #ffffff; outline: none; }
    textarea { min-height: 86px; resize: vertical; line-height: 1.55; }
    input:focus, textarea:focus, select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(36, 91, 143, 0.12); }

    .check-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 2px; }
    .check-item { display: flex; align-items: center; gap: 8px; min-height: 38px; padding: 8px 10px; border: 1px solid #dfe5ee; border-radius: 8px; background: #fbfcfe; color: #344054; font-size: 14px; }
    .check-item input { width: 16px; height: 16px; padding: 0; accent-color: var(--brand); }

    .tag { display: inline-flex; align-items: center; min-height: 24px; padding: 3px 8px; border-radius: 999px; background: #eef3f8; color: #344054; font-size: 12px; }

    .progress-shell { width: 100%; height: 9px; margin-top: 14px; border-radius: 999px; background: #e7edf4; overflow: hidden; }
    .progress-bar { width: 0; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--brand), var(--accent)); transition: width 0.35s ease; }

    .toast { position: fixed; right: 24px; bottom: 24px; z-index: 20; padding: 12px 14px; color: #ffffff; background: #172033; border-radius: 8px; box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18); transform: translateY(20px); opacity: 0; pointer-events: none; transition: 0.2s ease; }
    .toast.show { transform: translateY(0); opacity: 1; }

    .questionnaire-note { margin: 0 0 18px; padding: 14px 16px; border: 1px solid rgba(36, 91, 143, 0.18); border-radius: 8px; background: #f2f7fc; color: #344054; line-height: 1.65; }
    .output-panel { margin-top: 18px; padding: 16px; border-radius: 8px; border: 1px solid #dfe5ee; background: #fbfcfe; color: #344054; line-height: 1.65; display: none; }
    .output-panel.show { display: block; }
    .output-panel pre { white-space: pre-wrap; word-break: break-word; margin: 10px 0 0; padding: 12px; border-radius: 8px; background: #ffffff; border: 1px solid #e0e7ef; color: #172033; font-size: 13px; }

    /* 🌟 新增：注入的工单标识横幅样式 */
    .ticket-banner {
      display: none;
      margin-top: 16px;
      padding: 12px 18px;
      background: #eef3f8;
      border: 1px dashed var(--brand);
      border-radius: 8px;
      color: var(--brand-strong);
      font-size: 14px;
      font-weight: bold;
    }
    .ticket-banner span { margin-right: 24px; }
    .ticket-badge { background: #fff; padding: 2px 8px; border-radius: 4px; border: 1px solid #d9e0ea; color: var(--accent); font-family: monospace; }

    @media (max-width: 760px) {
      .main { padding: 18px; }
      .topbar { display: grid; gap: 16px; }
      .actions { justify-content: stretch; min-width: 0; }
      .btn { width: 100%; }
      .field-grid, .check-grid { grid-template-columns: 1fr; }
    }
    @media print {
      .actions, .form-actions, .output-panel { display: none !important; }
      .topbar { display: block; }
      .main { padding: 0; max-width: none; }
      .section { box-shadow: none; border: 0; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <main class="main">
      <div class="topbar">
        <div>
          <h1 class="page-title">酒店 AI 洞察系统｜客户问卷</h1>
          <p class="page-subtitle">请填写酒店基础信息、目标客群场景、核心卖点、重点平台、希望被 AI 推荐时出现的关键词、竞品与本次诊断目标。</p>
          
          <div id="ticketBanner" class="ticket-banner">
            <span>当前关联工单：<span id="displayTicketId" class="ticket-badge"></span></span>
            <span>授权填报账号：<span id="displayPhone" class="ticket-badge"></span></span>
          </div>
        </div>
        <div class="actions">
          <button class="btn secondary" data-action="sample" type="button">◎ 示例填充</button>
          <button class="btn secondary" data-action="print" type="button">打印 / 存 PDF</button>
        </div>
      </div>

      <p class="questionnaire-note">问卷完整度会根据必填项自动计算。必填项包括：客户名称、城市商圈、主要客群场景、酒店核心卖点、重点平台 / 信源、希望 AI 推荐时出现的关键词、本次诊断目标。</p>

      <section class="section" id="survey">
        <div class="section-head">
          <h2>客户问卷</h2>
          <span class="tag" id="pkgTag">独立问卷版</span>
        </div>
        <div class="section-body">
          <div style="margin-bottom: 18px;">
            <div style="display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 13px;">
              <span>问卷完整度</span>
              <strong id="surveyProgressText" style="color: var(--brand);">0%</strong>
            </div>
            <div class="progress-shell"><div class="progress-bar" id="surveyProgressBar"></div></div>
          </div>
          <form id="surveyForm" class="field-grid">
            <div class="field">
              <label for="clientName">客户名称</label>
              <input id="clientName" name="clientName" placeholder="例如：汉庭北京新国展祥云小镇店">
            </div>
            <div class="field">
              <label for="contact">联系人 / 电话</label>
              <input id="contact" name="contact" placeholder="用于报告归档">
            </div>
            <div class="field">
              <label for="brandName">品牌 / 管理方</label>
              <input id="brandName" name="brandName" placeholder="例如：华住 / 汉庭">
            </div>
            <div class="field">
              <label for="cityArea">城市商圈</label>
              <input id="cityArea" name="cityArea" placeholder="例如：北京顺义 · 新国展">
            </div>
            <div class="field full">
              <label for="hotelAddress">酒店地址</label>
              <input id="hotelAddress" name="hotelAddress" placeholder="用于判断周边场景和推荐词">
            </div>
            <div class="field full">
              <label>主要客群场景</label>
              <div class="check-grid" id="sceneChecks">
                <label class="check-item"><input type="checkbox" name="scenes" value="商务出差">商务出差</label>
                <label class="check-item"><input type="checkbox" name="scenes" value="机场中转">机场中转</label>
                <label class="check-item"><input type="checkbox" name="scenes" value="展会住宿">展会住宿</label>
                <label class="check-item"><input type="checkbox" name="scenes" value="亲子出游">亲子出游</label>
                <label class="check-item"><input type="checkbox" name="scenes" value="情侣约会">情侣约会</label>
                <label class="check-item"><input type="checkbox" name="scenes" value="本地休闲">本地休闲</label>
              </div>
            </div>
            <div class="field full">
              <label for="sellingPoints">酒店核心卖点</label>
              <textarea id="sellingPoints" name="sellingPoints" placeholder="例如：免费停车、机器人服务、自助洗衣、智能客控、55寸投屏电视"></textarea>
            </div>
            <div class="field full">
              <label for="platforms">重点平台 / 信源</label>
              <input id="platforms" name="platforms" placeholder="例如：携程、美团、抖音、小红书、官网、百度地图">
            </div>
            <div class="field full">
              <label for="recommendKeywords">希望 AI 推荐时出现的关键词</label>
              <input id="recommendKeywords" name="recommendKeywords" placeholder="例如：新国展附近酒店、首都机场中转酒店、顺义性价比酒店">
            </div>
            <div class="field full">
              <label for="knownCompetitors">主要竞品</label>
              <input id="knownCompetitors" name="knownCompetitors" placeholder="例如：桔子水晶、希尔顿欢朋、远航国际、亚朵">
            </div>
            <div class="field full">
              <label for="businessGoal">本次诊断目标</label>
              <textarea id="businessGoal" name="businessGoal" placeholder="例如：提升 AI 推荐可见度，找出被竞品截流的场景，并给出 30 天优化动作"></textarea>
            </div>
          </form>
          <div class="form-actions">
            <button class="btn secondary" id="resetForm" type="button">清空问卷</button>
            <button class="btn" id="submitSurvey" type="button">提交问卷</button>
          </div>
          <div class="output-panel" id="outputPanel">
            <strong id="outputTitle">提交结果</strong>
            <div id="outputMessage"></div>
            <pre id="outputJson"></pre>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const form = document.getElementById("surveyForm");
    const toast = document.getElementById("toast");
    const surveyProgressText = document.getElementById("surveyProgressText");
    const surveyProgressBar = document.getElementById("surveyProgressBar");
    const outputPanel = document.getElementById("outputPanel");
    const outputTitle = document.getElementById("outputTitle");
    const outputMessage = document.getElementById("outputMessage");
    const outputJson = document.getElementById("outputJson");

    // 🌟 核心拦截与赋能：原生的 URL 参数解析，彻底脱离 Vue Router 的控制
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const ticketId = urlParams.get('id');
      const phone = urlParams.get('phone');
      const pkg = urlParams.get('pkg');

      if (ticketId || phone) {
        // 显示工单横幅
        const banner = document.getElementById('ticketBanner');
        banner.style.display = 'flex';
        
        if (ticketId) document.getElementById('displayTicketId').textContent = ticketId;
        if (phone) {
          document.getElementById('displayPhone').textContent = phone;
          // 自动将手机号预填充到联系人表单中
          form.contact.value = phone; 
        }
      }

      if (pkg === 'basic') {
        document.getElementById('pkgTag').textContent = "工单版本：基础体验版";
      }
    });

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function getSelectedScenes() {
      return Array.from(form.querySelectorAll('input[name="scenes"]:checked')).map(item => item.value);
    }

    function getFormData() {
      // 获取时连同 URL 里的 Ticket ID 一起打包装入最终的提交数据中
      const urlParams = new URLSearchParams(window.location.search);
      return {
        ticketId: urlParams.get('id') || '独立填报',
        clientName: form.clientName.value.trim(),
        contact: form.contact.value.trim(),
        brandName: form.brandName.value.trim(),
        cityArea: form.cityArea.value.trim(),
        hotelAddress: form.hotelAddress.value.trim(),
        scenes: getSelectedScenes(),
        sellingPoints: form.sellingPoints.value.trim(),
        platforms: form.platforms.value.trim(),
        recommendKeywords: form.recommendKeywords.value.trim(),
        knownCompetitors: form.knownCompetitors.value.trim(),
        businessGoal: form.businessGoal.value.trim(),
        submittedAt: new Date().toLocaleString("zh-CN")
      };
    }

    function requiredProgress(data) {
      const required = [
        data.clientName,
        data.cityArea,
        data.scenes.length,
        data.sellingPoints,
        data.platforms,
        data.recommendKeywords,
        data.businessGoal
      ];
      const filled = required.filter(Boolean).length;
      return Math.round((filled / required.length) * 100);
    }

    function validateSurvey(data) {
      const missing = [];
      if (!data.clientName) missing.push("客户名称");
      if (!data.cityArea) missing.push("城市商圈");
      if (!data.scenes.length) missing.push("主要客群场景");
      if (!data.sellingPoints) missing.push("酒店核心卖点");
      if (!data.platforms) missing.push("重点平台 / 信源");
      if (!data.recommendKeywords) missing.push("推荐关键词");
      if (!data.businessGoal) missing.push("诊断目标");
      return missing;
    }

    function updateSurveyProgress() {
      const progress = requiredProgress(getFormData());
      surveyProgressText.textContent = `${progress}%`;
      surveyProgressBar.style.width = `${progress}%`;
    }

    function fillSample() {
      form.clientName.value = "汉庭北京新国展祥云小镇店";
      // 只有当没有从 URL 读取到 phone 时，才填充示例联系人
      if(!form.contact.value) form.contact.value = "张经理 / 13800000000";
      form.brandName.value = "华住 / 汉庭";
      form.cityArea.value = "北京顺义 · 新国展";
      form.hotelAddress.value = "北京市顺义区安泰大街祥云小镇附近";
      form.querySelectorAll('input[name="scenes"]').forEach(item => {
        item.checked = ["商务出差", "机场中转", "展会住宿"].includes(item.value);
      });
      form.sellingPoints.value = "免费停车、机器人服务、自助洗衣、智能客控、55寸投屏电视、24小时咖啡饮品";
      form.platforms.value = "携程、美团、抖音、小红书、官网、百度地图";
      form.recommendKeywords.value = "新国展附近酒店、首都机场中转酒店、顺义性价比酒店、展会住宿推荐";
      form.knownCompetitors.value = "桔子水晶、希尔顿欢朋、远航国际、亚朵";
      form.businessGoal.value = "提升 AI 推荐可见度，找出被竞品截流的场景，并给出 30 天优化动作。";
      updateSurveyProgress();
      showToast("示例内容已填充");
    }

    function submitSurvey() {
      const data = getFormData();
      const missing = validateSurvey(data);
      const progress = requiredProgress(data);
      outputPanel.classList.add("show");
      outputTitle.textContent = missing.length ? "问卷未完成" : "问卷已成功入库";
      outputMessage.textContent = missing.length
        ? `当前完整度 ${progress}%，请补充：${missing.join("、")}。`
        : `当前完整度 ${progress}%，已成功提交至 GEO 大数据中台，可复制下方 JSON 用于后续分析。`;
      outputJson.textContent = JSON.stringify(data, null, 2);
      showToast(missing.length ? "请补充必填项" : "问卷提交成功");
    }

    function resetSurvey() {
      form.reset();
      outputPanel.classList.remove("show");
      updateSurveyProgress();
      showToast("问卷已清空");
    }

    form.addEventListener("input", updateSurveyProgress);
    form.addEventListener("change", updateSurveyProgress);
    document.querySelector('[data-action="sample"]').addEventListener("click", fillSample);
    document.querySelector('[data-action="print"]').addEventListener("click", () => window.print());
    document.getElementById("submitSurvey").addEventListener("click", submitSurvey);
    document.getElementById("resetForm").addEventListener("click", resetSurvey);
    
    // 初始化进度条
    updateSurveyProgress();
  </script>
</body>
</html>
